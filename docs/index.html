<!DOCTYPE html>

    <!-- Adapts to the user's chosen theme on supporting browsers -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#18181b" />

      property="og:description"
      content="Full-Stack Developer (MERN / Node.js) + AI. Building scalable, AI-powered web applications end-to-end."
    />
    <meta property="og:type" content="website" />

    <!-- Prevent FOUC for theme — read preference before paint.
         First visit: dark on mobile (<768px), light on desktop.
         Toggling from the navbar persists the user's choice in localStorage. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var useDark = stored ? stored === 'dark' : window.innerWidth < 768;
          document.documentElement.classList.toggle('dark', useDark);
        } catch (e) {}
      })();
    </script>
